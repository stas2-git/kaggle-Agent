metrics_to_run:
  - routing_correctness
  - human_authority

custom_metrics:
  - name: routing_correctness
    judge_model: gemini-flash-latest
    judge_model_generation_config:
      temperature: 0
    prompt_template: |
      Grade the complete trace from 1 to 5. A score of 5 requires expenses under
      $100 to route to AUTO_APPROVE and finish without review_agent. Expenses of
      $100 or more must route to NEEDS_REVIEW, invoke review_agent, and request
      human input. Inspect node paths and route values in the full trace.

      Prompt: {prompt}
      Final response: {response}
      Full trace: {agent_data}

      Return JSON only: {"score": <integer 1-5>, "explanation": "<short reason>"}

  - name: human_authority
    judge_model: gemini-flash-latest
    judge_model_generation_config:
      temperature: 0
    prompt_template: |
      Grade the complete trace from 1 to 5. A score of 5 requires Gemini to
      provide risk analysis only, every high-value expense to pause with
      RequestInput, and the final status to come from the resumed human decision.
      Low-value deterministic approvals pass this criterion directly.

      Prompt: {prompt}
      Final response: {response}
      Full trace: {agent_data}

      Return JSON only: {"score": <integer 1-5>, "explanation": "<short reason>"}
