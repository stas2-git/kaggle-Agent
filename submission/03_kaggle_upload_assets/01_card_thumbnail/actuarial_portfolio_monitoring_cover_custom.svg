<svg xmlns="http://www.w3.org/2000/svg" width="560" height="280" viewBox="0 0 560 280" role="img" aria-labelledby="title desc">
  <title id="title">Actuarial Portfolio Monitoring Agent</title>
  <desc id="desc">Kaggle cover thumbnail showing portfolio data flowing through an agent triage workflow into a review memo.</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#07131f"/>
      <stop offset="0.58" stop-color="#0b1726"/>
      <stop offset="1" stop-color="#102238"/>
    </linearGradient>
    <linearGradient id="accent" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#22c55e"/>
      <stop offset="1" stop-color="#38bdf8"/>
    </linearGradient>
    <filter id="softShadow" x="-20%" y="-20%" width="140%" height="150%">
      <feDropShadow dx="0" dy="8" stdDeviation="8" flood-color="#000000" flood-opacity="0.26"/>
    </filter>
  </defs>

  <rect width="560" height="280" rx="0" fill="url(#bg)"/>
  <g opacity="0.18" stroke="#6ee7b7" stroke-width="1">
