<svg xmlns="http://www.w3.org/2000/svg" width="560" height="280" viewBox="0 0 560 280" role="img" aria-labelledby="title desc">
  <title id="title">Square-safe actuarial portfolio monitoring cover</title>
  <desc id="desc">A 560 by 280 Kaggle cover whose center 280 by 280 crop remains a balanced thumbnail.</desc>
  <defs>
