<svg xmlns="http://www.w3.org/2000/svg" width="560" height="560" viewBox="0 0 560 560" role="img" aria-labelledby="title desc">
  <title id="title">Actuarial portfolio monitoring master crop image</title>
  <desc id="desc">Single upload image designed for a 560 by 280 card crop from the top half and a 280 by 280 thumbnail crop from the bottom center.</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#07131f"/>
      <stop offset="0.58" stop-color="#0b1d2f"/>
      <stop offset="1" stop-color="#102a44"/>
    </linearGradient>
    <linearGradient id="accent" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#22c55e"/>
      <stop offset="1" stop-color="#38bdf8"/>
    </linearGradient>
    <filter id="shadow" x="-25%" y="-25%" width="150%" height="160%">
      <feDropShadow dx="0" dy="7" stdDeviation="7" flood-color="#000000" flood-opacity="0.28"/>
    </filter>
  </defs>

  <rect width="560" height="560" fill="url(#bg)"/>
  <g opacity="0.14" stroke="#6ee7b7" stroke-width="1">
