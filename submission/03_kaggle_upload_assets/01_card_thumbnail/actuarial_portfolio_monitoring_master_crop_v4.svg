        <text x="-1" y="72" font-family="Inter, Arial, sans-serif" font-size="10" font-weight="800" fill="#e0f2fe">TRIAGE</text>
      </g>
      <g transform="translate(174 15)">
        <rect x="5" y="0" width="42" height="49" rx="6" fill="#f8fafc"/>
        <rect x="14" y="12" width="24" height="4" rx="2" fill="#0f172a" opacity="0.35"/>
        <rect x="14" y="25" width="22" height="4" rx="2" fill="#0f766e" opacity="0.72"/>
        <rect x="14" y="37" width="27" height="4" rx="2" fill="#0ea5e9" opacity="0.72"/>
        <text x="-2" y="69" font-family="Inter, Arial, sans-serif" font-size="10" font-weight="800" fill="#e0f2fe">MEMO</text>
      </g>
