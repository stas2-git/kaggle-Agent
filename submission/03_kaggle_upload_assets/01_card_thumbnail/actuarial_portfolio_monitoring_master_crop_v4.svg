    <text x="436" y="414" font-family="Inter, Arial, sans-serif" font-size="12" font-weight="800" fill="#b7c5d7">Use center</text>
    <text x="436" y="430" font-family="Inter, Arial, sans-serif" font-size="12" font-weight="800" fill="#b7c5d7">lower panel</text>
