segments:
  - slide_number: 1
    slide_type: static
    title: "Actuarial Portfolio Monitoring Agent"
    visual: "slides/rendered/slide_1.png"
    hook: "The hard part isn't spotting movement. It's turning movement into judgment."
    cards:
      - "Manual load"
      - "Metric movement"
      - "Memo bottleneck"
    takeaway: "Monthly monitoring becomes an audit-ready first pass, not a scramble for explanation."
    audio_script: >-
      Routine monthly monitoring of insurance books of business is a critical but
      repetitive risk-management process. Actuaries and analysts must manually load
      transactional aggregates, compute key metrics, detect anomalies, decompose them
      by concentration drivers, and compile explanatory reports. Traditional business
      intelligence dashboards visualize these trends, but they stop at charts. They do
      not write the explanation or perform the initial triage, creating a
      time-consuming bottleneck for risk teams.
    visual_fact_keys: []

  - slide_number: 2
    slide_type: static
    title: "From Dashboard to Decision"
    visual: "slides/rendered/slide_2.png"
    hook: "Dashboards stop at awareness. Agents can carry the next step."
    cards:
      - "Validate input"
      - "Choose tool"
      - "Escalate review"
    takeaway: "The agent chooses the next tool, but every number still comes from deterministic code."
    audio_script: >-
      This workflow is highly suited to an agentic approach because it is multi-step,
      reasoning-driven, and requires strict security checks. A simple static script
      cannot dynamically decide how to triage issues. Our agent validates input schema
      quality, runs safety scans, identifies anomalies, selects the correct driver
      slicing tools, and compiles findings. To guarantee absolute mathematical
      correctness, we use a tool-first architecture where deterministic Python tools
      compute all metrics, and the LLM is restricted only to narrative synthesis.
    visual_fact_keys: []

  - slide_number: 3
    slide_type: static
    title: "Autonomy With Boundaries"
    visual: "slides/rendered/slide_3.png"
    hook: "Autonomy only works when the boundaries are explicit."
    cards:
      - "Data intake"
      - "Security scan"
      - "Python tools"
      - "Gemini synthesis"
      - "Report and trace"
    takeaway: "The system constrains what Gemini can do, so experts can trust what it says."
    audio_script: >-
      The agent's architecture consists of five modular layers. First, a data layer
      that ingests synthetic CSV aggregations. Second, a security layer that checks
      paths and text notes for prompt injections. Third, a deterministic tool layer
      that calculates premiums, loss ratios, and written-premium-weighted averages for
      rate changes, retention, and benchmark adequacy. Fourth, an agent reasoning
      layer that manages Gemini calls and structured schemas. And fifth, an output
      layer writing a markdown review memo and a complete JSON trace file.
    visual_fact_keys: []

  - slide_number: 4
    slide_type: evidence
    title: "From CSV to Review Gate"
    visual: "slides/rendered/slide_4.png"
    headline: "Example: June 2026 CSV triggers review."
    takeaway: "The agent does not just flag noise: material signals cross thresholds and trigger human review."
    audio_script: >-
      Let's look at the pipeline in action. A synthetic portfolio CSV moves through
      validation, metric calculation, anomaly detection, and the human review gate.
      The model is not inventing numbers. Bounded tools decide what needs
      investigation, then the agent prepares the result for actuarial review.
    visual_fact_keys:
      - loss_ratio_movement
      - claim_count_movement
      - human_review_gate

  - slide_number: 5
    slide_type: evidence
    title: "Two Symptoms, One Driver"
    visual: "slides/rendered/slide_5.png"
    headline: "The reveal: both signals point to the same slice."
    takeaway: "The reveal is convergence: both signals point to the same concentrated slice, then the memo frames what to review."
    audio_script: >-
      The reveal is convergence. The agent does not stop at saying something changed.
      It decomposes the movement and shows that multiple anomaly signals point to the
      same concentrated slice of the portfolio. The memo then turns that evidence into
      an executive summary, follow-up questions, and an auditable trace for human
      review.
    visual_fact_keys:
      - driver_concentration
      - report_artifact
      - trace_artifact

  - slide_number: 6
    slide_type: evidence
    title: "Proof, Not Vibes"
    visual: "slides/rendered/slide_6.png"
    headline: "Tests, evals, and scans back the claim."
    takeaway: "The demo story is backed by deterministic tests, scenario evals, and generated-asset scanning."
    audio_script: >-
      Proof matters here. The project is checked with deterministic tests, offline
      evaluation scenarios, prompt-injection cases, secret-disclosure cases, and
      generated-asset scanning. That keeps the demo grounded in repeatable checks, not
      one lucky run.
    visual_fact_keys:
      - pytest_headline
      - eval_headline
      - secret_scan_status

  - slide_number: 7
    slide_type: static
    title: "Audit-Ready First Pass"
    visual: "slides/rendered/slide_7.png"
    hook: "From monthly scramble to audit-ready first pass."
    cards:
      - "Now: CSV triage"
      - "Next: BigQuery analytics"
      - "Next: Scheduled runs"
      - "Next: Email alerts"
    takeaway: "This is a force multiplier for experts, not a substitute for actuarial judgment."
    audio_script: >-
      The Actuarial Portfolio Monitoring Agent is not a replacement for professional
      actuarial opinion or underwriting authority. Instead, it serves as a robust
      triage assistant that makes routine reviews faster, safer, and thoroughly
      documented. For future work, we plan to transition from flat CSVs to running
      direct BigQuery analytical queries, GKE-run containerized scheduling, and email
      alerts. Thank you.
    visual_fact_keys: []
